<div class="sidebar-tree">
  <p class="caption" role="heading"><span class="caption-text">{% if language == "zh-CN" %}语言{% else %}Language{% endif %}</span></p>
  <ul>
    <li class="toctree-l1">
      {% if language == "en" %}
      <a class="reference internal" href="./{{ pagename }}.html">English</a>
      {% else %}
      <a class="reference internal" href="../{{ pagename }}.html">English</a>
      {% endif %}
    </li>
    <li class="toctree-l1">
      {% if language == "zh-CN" %}
      <a class="reference internal" href="./{{ pagename }}.html">简体中文</a>
      {% else %}
      <a class="reference internal" href="zh_CN/{{ pagename }}.html">简体中文</a>
      {% endif %}
    </li>
  </ul>
</div>
