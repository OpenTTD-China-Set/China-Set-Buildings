name: Docs

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.12.10
        run: uv python install 3.12.10
      - name: Create venv
        run: uv venv --python 3.12.10
      - name: Install system deps
        run: sudo apt update && sudo apt install libjpeg-dev zlib1g-dev
      - name: Install python deps
        run: uv pip install -r requirements.txt && uv pip install -r requirements-dev.txt
      - name: Setup Pages
        uses: actions/configure-pages@main
      - name: Build documentation
        run: uv run make doc.building
      - name: Upload artifact
        uses: actions/upload-pages-artifact@main
        with:
          path: ./docs/_build/html

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@main
